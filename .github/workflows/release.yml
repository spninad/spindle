# Workflow triggered on every version tag (e.g. v0.1.0).
#
# Steps
# ──────
#   1. Build the Swift binary for each platform (macOS arm64, macOS x86_64, Linux x86_64).
#   2. Package each binary into a tar.gz archive used by the Homebrew formula.
#   3. Create a GitHub Release and attach all archives.
#   4. Open a PR against spninad/homebrew-tap with updated formula + SHA256 hashes.
#
# Required repository secrets
# ───────────────────────────
#   TAP_GITHUB_TOKEN  – Personal access token with `contents: write` and `pull-requests: write` on spninad/homebrew-tap

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build matrix — one job per target platform
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build – ${{ matrix.os-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest      # Apple Silicon (arm64)
            os-label: macos-arm64
            archive-suffix: macos-arm64

          - runner: macos-15-intel    # Intel (x86_64)
            os-label: macos-x86_64
            archive-suffix: macos-x86_64

          - runner: ubuntu-latest     # Linux x86_64
            os-label: linux-x86_64
            archive-suffix: linux-x86_64

          - runner: ubuntu-24.04-arm  # Linux ARM64
            os-label: linux-arm64
            archive-suffix: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Swift build ──────────────────────────────────────────────────────────
      - name: Set up Swift (Linux only)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Build Swift binary
        run: swift build -c release

      # ── Archive for Homebrew ─────────────────────────────────────────────────
      - name: Package binary archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY=".build/release/spindle"
          ARCHIVE="spindle-${VERSION}-${{ matrix.archive-suffix }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$(dirname $BINARY)" "$(basename $BINARY)"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload Homebrew archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.os-label }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish — create GitHub Release + open Homebrew tap PR
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all archives (Homebrew)
        uses: actions/download-artifact@v4
        with:
          path: archives
          pattern: archive-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: archives/*.tar.gz
          generate_release_notes: true

      # ── Update Homebrew tap ──────────────────────────────────────────────────
      # Computes SHA256 for each platform archive, opens a PR against
      # spninad/homebrew-tap with the updated formula, and lets the tap's
      # brew test-bot CI validate it before a maintainer merges via pr-pull.
      # Requires TAP_GITHUB_TOKEN secret.
      - name: Open Homebrew tap PR
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="spindle-${VERSION}"

          ARM64_SHA=$(sha256sum  "archives/spindle-${VERSION}-macos-arm64.tar.gz"   | awk '{print $1}')
          X86_MAC_SHA=$(sha256sum "archives/spindle-${VERSION}-macos-x86_64.tar.gz"  | awk '{print $1}')
          LINUX_X64_SHA=$(sha256sum "archives/spindle-${VERSION}-linux-x86_64.tar.gz" | awk '{print $1}')
          LINUX_ARM_SHA=$(sha256sum "archives/spindle-${VERSION}-linux-arm64.tar.gz"  | awk '{print $1}')

          git clone \
            "https://x-access-token:${GH_TOKEN}@github.com/spninad/homebrew-tap.git" \
            tap-repo

          cd tap-repo
          git checkout -b "$BRANCH"

          FORMULA="Formula/spindle.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          sed -i "/macos-arm64\.tar\.gz/{n;s/sha256 \".*\"/sha256 \"${ARM64_SHA}\"/}" "$FORMULA"
          sed -i "/macos-x86_64\.tar\.gz/{n;s/sha256 \".*\"/sha256 \"${X86_MAC_SHA}\"/}" "$FORMULA"
          sed -i "/linux-arm64\.tar\.gz/{n;s/sha256 \".*\"/sha256 \"${LINUX_ARM_SHA}\"/}" "$FORMULA"
          sed -i "/linux-x86_64\.tar\.gz/{n;s/sha256 \".*\"/sha256 \"${LINUX_X64_SHA}\"/}" "$FORMULA"

          git add Formula/spindle.rb
          git diff --cached --quiet && echo "Formula unchanged, skipping PR." && exit 0
          git commit -m "spindle ${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --repo spninad/homebrew-tap \
            --base main \
            --head "$BRANCH" \
            --title "spindle ${VERSION}" \
            --body "Automated formula update for [spindle ${VERSION}](https://github.com/spninad/spindle/releases/tag/v${VERSION})."
